name: HA version compatibility

# Version-drift monitor: runs the integration tier against the pinned, latest,
# and dev pytest-homeassistant-custom-component (which tracks HA releases).
# Scheduled (never gates PRs); opens/updates a tracking issue on failure.
on:
  schedule:
    - cron: "0 5 * * 1"   # weekly, Monday 05:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  ha-compat:
    name: Integration @ ${{ matrix.name }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: pinned
            phacc: "==0.13.336"
            ha_dev: false
            experimental: false
          - name: latest
            phacc: ""
            ha_dev: false
            experimental: false
          - name: dev
            phacc: ""
            ha_dev: true
            experimental: true
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - name: Install HA test dependencies
        run: uv sync --only-group ha-test
      - name: Override HA test library version
        run: |
          if [ -n "${{ matrix.phacc }}" ]; then
            uv pip install "pytest-homeassistant-custom-component${{ matrix.phacc }}"
          else
            uv pip install -U pytest-homeassistant-custom-component
          fi
          if [ "${{ matrix.ha_dev }}" = "true" ]; then
            uv pip install -U "homeassistant @ git+https://github.com/home-assistant/core@dev" || true
          fi
      - name: Run integration tests
        # --no-sync so the manual version override above is not reverted by uv run.
        run: uv run --no-sync pytest tests/integration -v

      - name: Open / update tracking issue on failure
        if: ${{ failure() && !matrix.experimental }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          TITLE="HA compatibility check failing (${{ matrix.name }})"
          BODY="The integration tier failed against the ${{ matrix.name }} pytest-homeassistant-custom-component. A newer HA release may have broken the integration. Run: $RUN_URL"
          num=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number // empty')
          if [ -n "$num" ]; then
            gh issue comment "$num" --body "$BODY"
          else
            gh issue create --title "$TITLE" --body "$BODY"
          fi
