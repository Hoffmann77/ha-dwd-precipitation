name: Tests

on:
  pull_request:

jobs:
  # Pure parser unit tests — no HA, no wradlib, no network.
  unit-tests:
    name: Parser unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - name: Install unit-test dependencies
        run: uv sync --only-group unit-test
      - name: Run parser unit tests
        run: uv run pytest tests/test_parser.py -v

  # HA config flow + live DWD fetch — validates the integration end-to-end.
  integration-tests:
    name: Integration tests (HA environment)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - name: Install HA test dependencies
        run: uv sync --only-group ha-test
      - name: Run integration tests
        run: uv run pytest tests/test_integration.py -v

  # Compares our parser against wradlib + pyproj (the reference implementations).
  wradlib-comparison:
    name: wradlib comparison
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - name: Install wradlib dependencies
        run: uv sync --only-group wradlib-comparison
      - name: Run wradlib comparison tests
        run: uv run pytest tests/test_wradlib.py -v
