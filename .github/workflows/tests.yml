name: Tests

on:
  pull_request:

jobs:
  # Validates the component in HA's exact environment.
  # Only pytest-homeassistant-custom-component is installed — no wradlib.
  unit-tests:
    name: Unit tests (HA environment)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - name: Install HA test dependencies
        run: uv sync --only-group ha-test
      - name: Run unit tests
        run: uv run pytest -m "not wradlib and not integration" -v

  # Compares our parser against wradlib + pyproj (the reference implementations).
  wradlib-comparison:
    name: wradlib comparison
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - name: Install wradlib dependencies
        run: uv sync --only-group wradlib-comparison
      - name: Run wradlib comparison tests
        run: uv run pytest -m "wradlib" -v

  # Downloads a live RS file from DWD OpenData to catch format drift.
  integration:
    name: Live DWD integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - name: Install wradlib dependencies
        run: uv sync --only-group wradlib-comparison
      - name: Run live DWD integration test
        run: uv run pytest -m "integration" -v
