name: Tests

on:
  pull_request:

jobs:
  # Pure parser unit tests — no HA, no wradlib, no network.
  parser-tests:
    name: Parser unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - name: Install unit-test dependencies
        run: uv sync --only-group unit-test
      - name: Run parser unit tests
        run: uv run pytest tests/parser -v

  # HA config flow + entry/coordinator/sensor/product logic — validates the integration.
  integration-tests:
    name: Integration tests (HA environment)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - name: Install HA test dependencies
        run: uv sync --only-group ha-test
      - name: Run integration tests
        run: uv run pytest tests/integration -v

  # Compares our parser against wradlib + pyproj (the reference implementations).
  reference-tests:
    name: wradlib reference comparison
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - name: Install wradlib dependencies
        run: uv sync --only-group wradlib-comparison
      - name: Run reference comparison tests
        run: uv run pytest tests/reference -v
