name: Tests

on:
  pull_request:

jobs:
  # Validates the component in HA's exact environment.
  # Includes the live DWD integration test — requests is available transitively.
  unit-tests:
    name: Unit tests (HA environment)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - name: Install HA test dependencies
        run: uv sync --only-group ha-test
      - name: Run tests
        run: uv run pytest -m "not wradlib" -v

  # Compares our parser against wradlib + pyproj (the reference implementations).
  wradlib-comparison:
    name: wradlib comparison
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - name: Install wradlib dependencies
        run: uv sync --only-group wradlib-comparison
      - name: Run wradlib comparison tests
        run: uv run pytest -m "wradlib" -v
